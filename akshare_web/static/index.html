<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKShare Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f5ff;
      --panel: rgba(255, 255, 255, 0.84);
      --border: rgba(102, 114, 166, 0.18);
      --text: #243047;
      --muted: #68758e;
      --accent: #8f7ac7;
      --accent-soft: rgba(143, 122, 199, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(185, 211, 239, 0.5), transparent 28%),
        radial-gradient(circle at bottom right, rgba(201, 186, 231, 0.42), transparent 24%),
        linear-gradient(180deg, #fbf9ff 0%, #f1eef9 100%);
      color: var(--text);
      font-family: "Avenir Next", "Noto Sans SC", "PingFang SC", sans-serif;
    }

    .panel {
      width: min(760px, 100%);
      padding: 32px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 24px 60px rgba(97, 101, 136, 0.18);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      font-family: "Baskerville", "Times New Roman", serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    code {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--text);
      font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
    }

    pre {
      margin: 16px 0 0;
      padding: 18px;
      overflow: auto;
      border-radius: 18px;
      background: #191d2b;
      color: #eef2ff;
      font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="panel">
    <p class="eyebrow">AKShare Dashboard</p>
    <h1>前端还没有完成构建</h1>
    <p>
      当前后端已经可以启动，但 React 前端产物还没生成。请在仓库根目录执行一键部署脚本，脚本会自动安装 Python 依赖、前端依赖并构建 UI。
    </p>
    <pre>./scripts/deploy_web_console.sh</pre>
    <p>
      如果你只想先做前端构建，也可以执行 <code>npm install --prefix akshare_web/frontend</code> 和 <code>npm run build --prefix akshare_web/frontend</code>。
    </p>
  </main>
</body>
</html>
